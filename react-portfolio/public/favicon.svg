<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- Fluid glass gradient for text body -->
    <linearGradient id="glassBody" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7B73FF" stop-opacity="0.95"/>
      <stop offset="40%" stop-color="#00D4FF" stop-opacity="0.8"/>
      <stop offset="70%" stop-color="#FF6CAB" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#7B73FF" stop-opacity="0.9"/>
    </linearGradient>

    <!-- Liquid inner/top highlight -->
    <linearGradient id="liquidHighlight" x1="10%" y1="0%" x2="90%" y2="80%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.7"/>
      <stop offset="25%" stop-color="#ffffff" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#00D4FF" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- Deep liquid shadow inside -->
    <linearGradient id="liquidShadow" x1="0%" y1="20%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a1a" stop-opacity="0"/>
      <stop offset="60%" stop-color="#6C63FF" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#0a0a1a" stop-opacity="0.2"/>
    </linearGradient>

    <!-- Outer floating glow (REDUCED) -->
    <filter id="glassGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#6C63FF" flood-opacity="0.2"/>
    </filter>

    <!-- Inner bevel/refraction effect for the glass edge (REDUCED) -->
    <filter id="glassRefraction" x="-10%" y="-10%" width="120%" height="120%">
      <feOffset dx="1" dy="1"/>
      <feGaussianBlur stdDeviation="1.5" result="offset-blur"/>
      <feComposite operator="out" in="SourceGraphic" in2="offset-blur" result="inverse"/>
      <feFlood flood-color="white" flood-opacity="0.5" result="color"/>
      <feComposite operator="in" in="color" in2="inverse" result="shadow"/>
      <feComposite operator="over" in="shadow" in2="SourceGraphic"/>
    </filter>
  </defs>

  <g filter="url(#glassGlow)">
    <!-- Base text with liquid gradient (REDUCED LETTER SPACING for clear gap) -->
    <text x="50" y="72" 
          font-family="'Inter', -apple-system, sans-serif" 
          font-weight="900" 
          font-size="58" 
          text-anchor="middle" 
          letter-spacing="2"
          fill="url(#glassBody)"
          filter="url(#glassRefraction)"
          stroke="rgba(255,255,255,0.3)"
          stroke-width="1.2"
          stroke-linejoin="round">
      ST
    </text>

    <!-- Highlight overlay to make it look wet/glassy -->
    <text x="50" y="72" 
          font-family="'Inter', -apple-system, sans-serif" 
          font-weight="900" 
          font-size="58" 
          text-anchor="middle" 
          letter-spacing="2"
          fill="url(#liquidHighlight)"
          style="mix-blend-mode: screen;"
          pointer-events="none">
      ST
    </text>

    <!-- Shadow overlay for depth -->
    <text x="50" y="72" 
          font-family="'Inter', -apple-system, sans-serif" 
          font-weight="900" 
          font-size="58" 
          text-anchor="middle" 
          letter-spacing="2"
          fill="url(#liquidShadow)"
          pointer-events="none">
      ST
    </text>

    <!-- Little refraction sparkles -->
    <circle cx="28" cy="28" r="1.5" fill="white" opacity="0.9" />
    <circle cx="70" cy="65" r="1" fill="white" opacity="0.6" />
    <circle cx="75" cy="28" r="1.5" fill="url(#liquidHighlight)" opacity="0.8" />
  </g>
</svg>
